<title>US Stock Widgets — 시총 상위 종목 분석</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --border: #2e3347;
    --text: #e8eaf0;
    --text2: #9aa0b8;
    --text3: #5c6282;
    --bull: #D85A30;
    --bear: #185FA5;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', -apple-system, sans-serif;
    line-height: 1.5;
  }
  header {
    padding: 40px 24px 28px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  header p { color: var(--text2); font-size: 14px; }
  header .stats { color: var(--text3); font-size: 12px; margin-top: 10px; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 60px; }
  .controls { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
  #search {
    width: 100%; max-width: 360px; margin: 0 auto;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 999px;
    color: var(--text); padding: 10px 18px; font-size: 14px; display: block;
  }
  #search:focus { outline: none; border-color: var(--text2); }
  .sector-nav { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .sector-btn {
    border: 1px solid var(--border); background: var(--bg2); color: var(--text2);
    border-radius: 999px; padding: 7px 14px; font-size: 12.5px; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .sector-btn:hover { border-color: var(--text2); color: var(--text); }
  .sector-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px; margin-top: 28px;
  }
  .card {
    display: block; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; text-decoration: none;
    transition: transform .15s, box-shadow .15s, border-color .15s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(0,0,0,.35); }
  .card-rank { font-size: 14px; color: var(--text2); font-weight: 700; margin-bottom: 10px; }
  .card-ticker { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
  .card-name { font-size: 12.5px; color: var(--text2); margin-bottom: 10px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-sector {
    display: inline-block; font-size: 10.5px; padding: 2px 9px; border-radius: 999px;
    background: var(--bg3); color: var(--text2); margin-bottom: 8px;
  }
  .card-updated { font-size: 10.5px; color: var(--text3); }
  .empty-msg { text-align: center; color: var(--text3); padding: 60px 0; font-size: 14px; }
  footer { text-align: center; color: var(--text3); font-size: 11.5px; padding: 30px 20px; }

  .macro-strip {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;
    margin-bottom: 24px;
  }
  .macro-tile {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; text-align: center;
  }
  .macro-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; }
  .macro-value { font-size: 16px; font-weight: 700; color: var(--text); margin-top: 3px; }
  .macro-sub { font-size: 10.5px; color: var(--text3); margin-top: 2px; }
  .macro-sub.up { color: #2ecc71; }
  .macro-sub.down { color: #e74c3c; }
  @media (max-width: 900px) {
    .macro-strip { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 520px) {
    .macro-strip { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

  <div class="stats" id="headerStats"></div>
</header>

<div class="wrap">
  <div class="macro-strip" id="macroStrip"></div>
  <div class="controls">
    <input id="search" type="text" placeholder="티커 또는 종목명 검색...">
    <div class="sector-nav" id="sectorNav"></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty-msg" id="emptyMsg" style="display:none;">해당 조건에 맞는 종목이 없습니다.</div>
</div>

<footer>
  ⚠ 본 자료는 투자 권고가 아니며, 투자 판단의 참고 자료로만 활용하시기 바랍니다.<br>

  },

  }
}/*MACRO_JSON_END*/;

const SECTORS = [...new Set(STOCKS.map(s => s.sector))].sort();
const sectorNav = document.getElementById('sectorNav');
const grid = document.getElementById('grid');
const emptyMsg = document.getElementById('emptyMsg');
const searchBox = document.getElementById('search');

let activeSector = 'ALL';

function renderSectorNav() {
  const buttons = ['ALL', ...SECTORS].map(sec => {
    const label = sec === 'ALL' ? '전체' : sec;
    return `<button class="sector-btn${sec === activeSector ? ' active' : ''}" data-sector="${sec}">${label}</button>`;
  }).join('');
  sectorNav.innerHTML = buttons;
  sectorNav.querySelectorAll('.sector-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeSector = btn.dataset.sector;
      renderSectorNav();
      renderGrid();
    });
  });
}

function renderGrid() {
  const q = searchBox.value.trim().toLowerCase();
  const filtered = STOCKS.filter(s => {
    const matchesSector = activeSector === 'ALL' || s.sector === activeSector;
    const matchesQuery = !q || s.ticker.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
    return matchesSector && matchesQuery;
  }).sort((a, b) => a.rank - b.rank);

  grid.innerHTML = filtered.map(s => `
    <a class="card" href="${s.page}" style="border-color: ${s.accentColor}33;">
      <div class="card-rank">시총 #${s.rank}</div>
      <div class="card-ticker" style="color: ${s.accentColor};">${s.ticker}</div>
      <div class="card-name">${s.name}</div>
      <div class="card-sector">${s.sector}</div>
      <div class="card-updated">업데이트 ${s.lastUpdated}</div>
    </a>
  `).join('');

  emptyMsg.style.display = filtered.length ? 'none' : 'block';
}

function renderHeaderStats() {
  const count = STOCKS.length;
  const latest = STOCKS.reduce((max, s) => s.lastUpdated > max ? s.lastUpdated : max, '');
  document.getElementById('headerStats').textContent =
    count ? `${count}개 종목 수록 · 마지막 업데이트 ${latest}` : '';
}

function fmtChangeSub(changePct) {
  if (changePct === null || changePct === undefined) return '';
  const cls = changePct >= 0 ? 'up' : 'down';
  const sign = changePct >= 0 ? '+' : '';
  return `<div class="macro-sub ${cls}">${sign}${changePct.toFixed(2)}%</div>`;
}

function fmtMonth(dateStr) {
  const [y, m] = dateStr.split('-');
  return `${y}.${m}`;
}

function fmtFomcDate(dateStr) {
  const [, m, d] = dateStr.split('-');
  return `${parseInt(m)}/${parseInt(d)}`;
}

function renderMacroStrip() {
  const el = document.getElementById('macroStrip');
  if (!MACRO) { el.style.display = 'none'; return; }

  const tiles = [
    {
      label: 'S&P 500',
      value: MACRO.spy ? '$' + MACRO.spy.value.toFixed(2) : MACRO.sp500.value.toLocaleString(undefined, {maximumFractionDigits: 0}) + 'pt',
      sub: fmtChangeSub(MACRO.spy ? MACRO.spy.changePct : MACRO.sp500.changePct)
        + `<div class="macro-sub" style="color: var(--text);">${MACRO.sp500.value.toLocaleString(undefined, {maximumFractionDigits: 0})}pt</div>`,
    },
    {
      label: 'VIX',
      value: MACRO.vix.value.toFixed(2),
      sub: fmtChangeSub(MACRO.vix.changePct),
    },
    {
      label: '원/달러',
      value: '₩' + MACRO.usdkrw.value.toLocaleString(undefined, {maximumFractionDigits: 0}),
      sub: fmtChangeSub(MACRO.usdkrw.changePct),
    },
    {
      label: '기준금리',
      value: MACRO.fedFunds.value.toFixed(2) + '%',
      sub: MACRO.nextFomcMeeting
        ? `<div class="macro-sub">다음 FOMC ${fmtFomcDate(MACRO.nextFomcMeeting.start)}</div>`
        : '',
    },
    {
      label: '실업률',
      value: MACRO.unemploymentRate.value.toFixed(1) + '%',
      sub: `<div class="macro-sub">${fmtMonth(MACRO.unemploymentRate.asOf)}</div>`,
    },
    {
      label: 'CPI YoY',
      value: MACRO.cpiYoy.value.toFixed(1) + '%',
      sub: `<div class="macro-sub">${fmtMonth(MACRO.cpiYoy.asOf)}</div>`,
    },
  ];

  el.innerHTML = tiles.map(t => `
    <div class="macro-tile">
      <div class="macro-label">${t.label}</div>
      <div class="macro-value">${t.value}</div>
      ${t.sub}
    </div>
  `).join('');
}
